on:
  push:
    branches: main

name: Quarto Publish

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'      # siempre usa la última versión estable de R
          use-public-rspm: true     # paquetes binarios: mucho más rápido que compilar

      - name: Install R packages
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::knitr
            any::rmarkdown
            any::tidyverse
            any::ggplot2
            any::vtable
            any::chilemapas
            any::palmerpenguins
            any::ggthemes
            any::plotly
            any::fBasics
            any::gridExtra
            any::nycflights13
            any::r2resize

      - name: Render and Publish
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages